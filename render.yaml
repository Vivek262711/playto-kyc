# Render Blueprint — deploys the full-stack KYC app
# https://render.com/docs/blueprint-spec

databases:
  - name: playto-kyc-db
    databaseName: kyc_pipeline
    plan: free
    region: oregon

services:
  - type: web
    name: playto-kyc-pipeline
    runtime: python
    plan: free
    region: oregon
    buildCommand: "./build.sh"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-kyc-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: NODE_VERSION
        value: "20.10.0"
      - key: SECURE_SSL_REDIRECT
        value: "True"
